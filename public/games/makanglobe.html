<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MakanGlobe</title>
  <link rel="stylesheet" href="../makan-theme.css">
  <!-- Three.js r169 — bundled locally (no CDN dependency) -->
  <script type="importmap">
    {"imports":{"three":"./three.module.min.js"}}
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      background: linear-gradient(160deg, #060e1e 0%, #0a1628 100%);
    }

    /* Three.js canvas fills the screen */
    #canvas-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Loading overlay / start screen ── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    .fe {
      position: absolute; opacity: 0.30;
      animation: fe-float var(--d, 6s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    @keyframes fe-float {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      30%       { transform: translateY(-22px) rotate(9deg) scale(1.07); }
      65%       { transform: translateY(13px) rotate(-4deg) scale(0.95); }
    }
    .start-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 28px; padding: 44px 54px 40px;
      box-shadow:
        0 0 0 1px rgba(0,201,160,0.20),
        0 24px 80px rgba(0,0,0,0.60),
        0 2px 12px rgba(0,0,0,0.30);
      border: 1.5px solid rgba(255,255,255,0.65); text-align: center;
    }
    .start-icon {
      font-size: 68px; line-height: 1;
      animation: makan-bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .start-title {
      font-family: var(--font);
      font-size: 46px; font-weight: 900; color: #00C9A0;
      letter-spacing: -2px; line-height: 1; margin-top: 2px;
    }
    .start-rule {
      width: 44px; height: 4px;
      background: linear-gradient(90deg, #00C9A0, #4FACFE);
      border-radius: 2px; margin: 2px 0 4px;
    }
    .start-sub {
      font-family: var(--font);
      font-size: 15px; font-weight: 700; color: var(--makan-text-2);
      max-width: 230px; line-height: 1.45;
    }
    .spin-how {
      font-family: var(--font);
      font-size: 11px; font-weight: 700;
      color: rgba(10, 40, 80, 0.45);
      letter-spacing: 0.03em; text-align: center;
      margin-top: 0; margin-bottom: 2px;
    }
    #loading-state {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-top: 4px;
    }
    #loading-text {
      font-family: var(--font);
      font-size: 15px; font-weight: 700; color: var(--makan-text-2);
    }
    #tap-prompt {
      display: none; margin-top: 4px;
      font-family: var(--font);
      font-size: 18px; font-weight: 900; cursor: pointer;
      padding: 15px 46px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE); color: #fff;
      border: none; border-radius: var(--r-full);
      box-shadow: 0 4px 22px rgba(0,201,160,0.45);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease,
                  opacity 0.2s ease;
      user-select: none; -webkit-user-select: none;
    }
    #tap-prompt:not(:disabled):hover {
      transform: scale(1.07); box-shadow: 0 6px 32px rgba(0,201,160,0.58);
    }
    #tap-prompt:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Filters ── */
    #filter-wrap {
      display: none;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      margin-top: 4px;
    }
    .filter-row { display: flex; align-items: flex-start; gap: 7px; }
    .flabel {
      font-family: var(--font);
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--makan-text-muted);
      min-width: 46px; padding-top: 5px; flex-shrink: 0;
      text-align: right;
    }
    .fpills { display: flex; flex-wrap: wrap; gap: 5px; }
    .fpill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 10px; border: none; border-radius: 99px;
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer;
      background: rgba(10, 30, 60, 0.07);
      color: var(--makan-text-2);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.15s ease, box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    .fpill:hover  { background: rgba(0,201,160,0.14); transform: scale(1.07); }
    .fpill.active { background: linear-gradient(135deg, #00C9A0, #4FACFE); color: #fff;
                    box-shadow: 0 2px 10px rgba(0,201,160,0.40); transform: scale(1.05); }
    .filter-divider {
      width: 100%; height: 1px;
      background: rgba(0,201,160,0.18);
      margin: 2px 0;
    }
    #filter-count {
      font-family: var(--font);
      font-size: 12px; font-weight: 700;
      color: var(--makan-text-muted);
      text-align: center; transition: color 0.2s ease;
    }
    #filter-count.empty { color: var(--makan-coral); }

    /* ── Drag Hint ── */
    #drag-hint {
      position: fixed; top: 22px; left: 50%;
      transform: translateX(-50%);
      z-index: 100; pointer-events: none; display: none;
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800;
      color: rgba(255, 255, 255, 0.90);
      letter-spacing: 0.10em; text-transform: uppercase;
      background: rgba(0,0,0,0.32);
      backdrop-filter: blur(8px);
      padding: 7px 18px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Result Backdrop ── */
    #result-backdrop {
      position: fixed; inset: 0;
      background: rgba(10, 15, 30, 0.52);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(4px);
    }
    #result-backdrop.visible { opacity: 1; pointer-events: auto; }

    /* ── Result Dialog ── */
    #result-dialog {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.72);
      z-index: 1000;
      background: #fff; border-radius: 28px;
      padding: 48px 44px 40px;
      text-align: center; max-width: 420px; width: 92%;
      opacity: 0; pointer-events: none;
      transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22);
    }
    #result-dialog.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1; pointer-events: auto;
    }
    #result-label {
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2.5px;
      color: #00C9A0; margin-bottom: 22px;
    }
    #result-logo {
      width: 110px; height: 110px;
      object-fit: contain; border-radius: 16px;
      margin: 0 auto 18px; display: block;
    }
    #result-logo-fallback {
      width: 110px; height: 110px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      border-radius: 50%; display: none;
      align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-size: 48px; font-weight: 900; color: #fff;
      margin: 0 auto 18px;
    }
    #result-name {
      font-family: 'Nunito', sans-serif;
      font-size: 30px; font-weight: 900; color: #111827;
      margin-bottom: 8px; letter-spacing: -0.02em;
    }
    #result-venue {
      font-family: 'Nunito', sans-serif;
      font-size: 16px; color: #6b7280;
      margin-bottom: 32px; font-weight: 600;
    }
    #spin-again-btn {
      padding: 16px 44px; border: none; border-radius: 50px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 201, 160, 0.38);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    #spin-again-btn:hover  { transform: scale(1.04); box-shadow: 0 6px 22px rgba(0,201,160,0.52); }
    #spin-again-btn:active { transform: scale(0.96); }

    /* ── Logo overlay layer ── */
    #logo-layer {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5; /* above globe canvas, below drag-hint */
    }
    .mlogo {
      position: absolute;
      left: 0; top: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid;
      background: #fff;
      display: none; /* shown once image loads */
      will-change: transform, opacity;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
    }

    /* ── Swipe Guide ─────────────────────────────────────────────────────── */
    #swipe-guide {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 110px; height: 110px;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #swipe-guide.visible { opacity: 1; }

    .sg-ring {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,201,160,0.65);
      animation: sg-expand 2.8s ease-out infinite;
    }
    .sg-r2 { animation-delay: 1.4s; }
    @keyframes sg-expand {
      0%   { transform: scale(1);   opacity: 0.85; }
      100% { transform: scale(3.2); opacity: 0;    }
    }
    .sg-arr {
      position: absolute;
      font-family: var(--font);
      font-size: 22px; font-weight: 900;
      color: #fff;
      text-shadow: 0 0 16px rgba(0,201,160,1), 0 0 32px rgba(0,201,160,0.5);
      animation: sg-glow 2.4s ease-in-out infinite;
    }
    .sg-up { top: -28px;    left: 50%; transform: translateX(-50%); animation-delay: 0s;    }
    .sg-dn { bottom: -28px; left: 50%; transform: translateX(-50%); animation-delay: 0.6s;  }
    .sg-lt { left: -28px;   top: 50%;  transform: translateY(-50%); animation-delay: 1.2s;  }
    .sg-rt { right: -28px;  top: 50%;  transform: translateY(-50%); animation-delay: 1.8s;  }
    @keyframes sg-glow {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 1.00; }
    }

    /* ── Browse FAB ── */
    #browse-btn {
      position: fixed; bottom: 28px; right: 24px;
      z-index: 20; display: none;
      padding: 13px 20px;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      color: #fff; border: none; border-radius: 50px;
      font-family: var(--font); font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 20px rgba(0,201,160,0.45);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    }
    #browse-btn:hover  { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,201,160,0.60); }
    #browse-btn:active { transform: scale(0.95); }

    /* ── Browse Sheet ── */
    #browse-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      z-index: 30; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #browse-backdrop.visible { opacity: 1; pointer-events: auto; }

    #browse-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 31; max-height: 72vh;
      background: #fff; border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    }
    #browse-sheet.visible { transform: translateY(0); }

    #browse-sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: #d1d5db; margin: 12px auto 8px; flex-shrink: 0;
    }
    #browse-sheet-title {
      font-family: var(--font); font-size: 14px; font-weight: 800;
      color: #111827; padding: 0 20px 12px; text-align: center;
      border-bottom: 1px solid #f3f4f6; flex-shrink: 0;
    }
    #browse-list {
      overflow-y: auto; flex: 1; padding: 6px 0;
      -webkit-overflow-scrolling: touch;
    }
    .browse-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; cursor: pointer;
      transition: background 0.12s ease;
      border-bottom: 1px solid #f9fafb;
    }
    .browse-item:hover  { background: #f0fdf9; }
    .browse-item:active { background: #e0faf3; }
    .browse-item:last-child { border-bottom: none; }
    .browse-item-logo {
      width: 44px; height: 44px; border-radius: 10px;
      object-fit: contain; flex-shrink: 0; background: #f3f4f6;
    }
    .browse-item-logo-fallback {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #00C9A0, #4FACFE);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font); font-size: 20px; font-weight: 900; color: #fff;
    }
    .browse-item-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .browse-item-name {
      font-family: var(--font); font-size: 15px; font-weight: 700; color: #111827;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .browse-item-venue {
      font-family: var(--font); font-size: 12px; color: #6b7280; font-weight: 600;
    }

    @media (max-width: 600px) {
      .start-card  { padding: 28px 20px 24px; }
      .start-title { font-size: 38px; }
      .start-icon  { font-size: 56px; }
      .start-sub   { font-size: 14px; max-width: 200px; }
      .flabel      { min-width: 38px; font-size: 9px; }
      .fpill       { font-size: 11px; padding: 3px 8px; }
      #result-dialog { padding: 28px 24px 24px; }
      #result-name  { font-size: 18px; }
      #browse-btn   { bottom: 20px; right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay / start screen -->
  <div id="loading-overlay">
    <span class="fe" style="top:7%;left:5%;font-size:34px;--d:5.4s;--del:0s">🍜</span>
    <span class="fe" style="top:68%;left:3%;font-size:22px;--d:6.9s;--del:1.1s">🥢</span>
    <span class="fe" style="top:14%;right:7%;font-size:40px;--d:4.8s;--del:0.6s">🍔</span>
    <span class="fe" style="top:76%;right:5%;font-size:27px;--d:7.3s;--del:2.0s">🍣</span>
    <span class="fe" style="top:44%;left:2%;font-size:20px;--d:5.8s;--del:1.5s">🧆</span>
    <span class="fe" style="top:36%;right:3%;font-size:32px;--d:6.2s;--del:0.3s">🌮</span>
    <span class="fe" style="bottom:16%;left:11%;font-size:26px;--d:5.1s;--del:2.5s">🍕</span>
    <span class="fe" style="bottom:10%;right:11%;font-size:36px;--d:7.7s;--del:1.8s">🍱</span>

    <div class="start-card">
      <div class="start-icon">🌍</div>
      <h1 class="start-title">MakanGlobe</h1>
      <div class="start-rule"></div>
      <p class="start-sub">Spin the globe to discover your next restaurant!</p>
      <p class="spin-how">↔ Drag in any direction &nbsp;·&nbsp; 📋 Browse restaurants below</p>

      <!-- Filters (shown after data loads) -->
      <div id="filter-wrap">
        <div class="filter-divider"></div>
        <div class="filter-row">
          <span class="flabel">Dietary</span>
          <div class="fpills">
            <button class="fpill" data-catid="724">🌙 Halal</button>
            <button class="fpill" data-catid="732">🐷 Pork Free</button>
            <button class="fpill" data-catid="735">🥗 Veg</button>
            <button class="fpill" data-catid="728">👦 Kids</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Cuisine</span>
          <div class="fpills">
            <button class="fpill" data-catid="730">🍜 Local</button>
            <button class="fpill" data-catid="720">🥢 Chinese</button>
            <button class="fpill" data-catid="727">🍱 Japanese</button>
            <button class="fpill" data-catid="729">🌶️ Korean</button>
            <button class="fpill" data-catid="737">🍔 Western</button>
            <button class="fpill" data-catid="725">🍛 Indian</button>
            <button class="fpill" data-catid="734">🌿 Thai</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Type</span>
          <div class="fpills">
            <button class="fpill" data-catid="721">🍰 Desserts</button>
            <button class="fpill" data-catid="722">🥤 Drinks</button>
            <button class="fpill" data-catid="719">☕ Café</button>
            <button class="fpill" data-catid="718">🥐 Bakery</button>
            <button class="fpill" data-catid="723">⚡ Fast Food</button>
            <button class="fpill" data-catid="733">🍿 Snack</button>
          </div>
        </div>
        <p id="filter-count"></p>
        <div class="filter-divider"></div>
      </div>

      <div id="loading-state">
        <div class="makan-spinner"></div>
        <p id="loading-text">Loading globe…</p>
      </div>
      <button id="tap-prompt">Spin the Globe! 🌍</button>
    </div>
  </div>

  <!-- Three.js renders here -->
  <div id="canvas-wrap"></div>

  <!-- HTML logo overlays (positioned by JS each frame) -->
  <div id="logo-layer"></div>

  <!-- Swipe direction guide -->
  <div id="swipe-guide">
    <div class="sg-ring"></div>
    <div class="sg-ring sg-r2"></div>
    <div class="sg-arr sg-up">↑</div>
    <div class="sg-arr sg-dn">↓</div>
    <div class="sg-arr sg-lt">←</div>
    <div class="sg-arr sg-rt">→</div>
  </div>

  <!-- UI chrome -->
  <div id="drag-hint">Drag to spin &nbsp;·&nbsp; 📋 Browse All</div>

  <!-- Result dialog -->
  <div id="result-backdrop"></div>
  <div id="result-dialog">
    <div id="result-label">You're eating at</div>
    <img id="result-logo" alt="">
    <div id="result-logo-fallback"></div>
    <h2 id="result-name"></h2>
    <p id="result-venue"></p>
    <button id="spin-again-btn">Spin Again ✨</button>
  </div>

  <!-- Browse FAB + bottom sheet -->
  <button id="browse-btn">📋 Browse All</button>
  <div id="browse-backdrop"></div>
  <div id="browse-sheet">
    <div id="browse-sheet-handle"></div>
    <div id="browse-sheet-title">Choose a Restaurant</div>
    <div id="browse-list"></div>
  </div>

  <!-- Restaurant data (defines loadFBShops, pickRandom as globals) -->
  <script src="data.js"></script>
  <!-- TopoJSON client for country border decoding -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- Game logic — module script deferred after DOM; data.js globals are available -->
  <script type="module">
  import * as THREE from 'three';

  // Catch any module-level uncaught error and surface it instead of hanging
  window.addEventListener('error', e => {
    const t = document.getElementById('loading-text');
    if (t) t.textContent = 'JS error: ' + (e.message || e);
  });
  window.addEventListener('unhandledrejection', e => {
    const t = document.getElementById('loading-text');
    if (t) t.textContent = 'Error: ' + (e.reason?.message || e.reason || 'unknown');
  });

  /* ═══════════════════════════════════════════════════════════════════════════
     MakanGlobe — Three.js rewrite
     A 3D globe of restaurant markers you can drag/swipe to spin.
     Directional drag → inertial coast → snap to nearest → result dialog.
  ═══════════════════════════════════════════════════════════════════════════ */

  /* ── CONFIG ──────────────────────────────────────────────────────────────── */
  const CFG = {
    GLOBE_R:       2.0,      // sphere radius (world units)
    MARKER_R:      2.16,     // marker sprite radius (just outside sphere)
    MARKER_N:      48,       // restaurant markers to show
    CAM_Z:         5.2,      // camera Z position
    FRICTION:      0.960,    // per-frame velocity decay while coasting
    SNAP_LERP:     0.09,     // slerp factor per frame during snap
    SNAP_DONE:     0.0008,   // angle threshold (rad) to finish snap
    IDLE_SPEED:    0.0014,   // idle auto-rotate speed (rad/frame, yaw)
    DRAG_SENSE:    0.005,    // radians-per-pixel for drag
    MIN_COAST_V:   0.004,    // min release speed to enter coast phase
    MIN_SPIN_DIST: 160,      // min drag distance (px) for a spin to count
    IMPULSE:       0.11,     // base impulse magnitude for spin button
    VEL_AVG:       5,        // velocity history frames to average on release
    TICK_THRESH:   0.65,     // accumulated angle (rad) between tick sounds
    PALETTE: ['#FF6B35', '#EF476F', '#06D6A0', '#C45AFF', '#FFD23F', '#5BA8FF'],
  };

  /* ── STATE ───────────────────────────────────────────────────────────────── */
  const S = {
    phase:     'idle',  // idle | dragging | coasting | snapping | stopped
    velX:      0,       // pitch velocity (rad/frame)
    velY:      0,       // yaw velocity (rad/frame)
    drag:      false,
    dragPX:    0, dragPY: 0,
    vHistX:    [], vHistY: [],
    snapQuat:  new THREE.Quaternion(),
    snapMark:  null,
    markers:   [],      // [{sprite, shop, localPos}]
    allShops:  [],
    tickAcc:   0,       // accumulated angle for tick sounds
    totalDist: 0,       // accumulated drag distance (px) for current gesture
  };

  /* ── FILTERS ─────────────────────────────────────────────────────────────── */
  const FILTER_GROUPS = {
    dietary: [724, 732, 735, 728],
    cuisine: [730, 720, 727, 729, 737, 725, 734],
    type:    [721, 722, 719, 718, 723, 733],
  };
  const activeFilters = new Set();

  function getFilteredShops() {
    if (activeFilters.size === 0) return S.allShops;
    const activeByGroup = {};
    for (const id of activeFilters) {
      for (const [group, ids] of Object.entries(FILTER_GROUPS)) {
        if (ids.includes(id)) {
          if (!activeByGroup[group]) activeByGroup[group] = [];
          activeByGroup[group].push(id);
          break;
        }
      }
    }
    return S.allShops.filter(shop =>
      Object.values(activeByGroup).every(groupIds =>
        groupIds.some(id => shop.categories.includes(id))
      )
    );
  }

  function updateFilterCount() {
    const n   = getFilteredShops().length;
    const el  = document.getElementById('filter-count');
    const btn = document.getElementById('tap-prompt');
    el.textContent = n === 0
      ? 'No restaurants match — try fewer filters'
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
    el.classList.toggle('empty', n === 0);
    btn.disabled      = n === 0;
    btn.style.opacity = n === 0 ? '0.45' : '';
  }

  function initFilters() {
    const wrap = document.getElementById('filter-wrap');
    wrap.style.display = 'flex';
    updateFilterCount();
    wrap.querySelectorAll('.fpill').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.catid);
        if (activeFilters.has(id)) {
          activeFilters.delete(id);
          btn.classList.remove('active');
        } else {
          activeFilters.add(id);
          btn.classList.add('active');
        }
        updateFilterCount();
      });
    });
  }

  /* ── AUDIO ───────────────────────────────────────────────────────────────── */
  let audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTick(vol) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime, dur = 0.025, sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 2500; flt.Q.value = 1.2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(Math.min(0.14, vol), now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(now); src.stop(now + dur);
  }

  let wNode = null, wGain = null, wFlt = null;
  function startWhoosh() {
    if (!audioCtx || wNode) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    wNode = audioCtx.createBufferSource(); wNode.buffer = buf; wNode.loop = true;
    wFlt  = audioCtx.createBiquadFilter(); wFlt.type = 'bandpass'; wFlt.frequency.value = 200; wFlt.Q.value = 0.8;
    wGain = audioCtx.createGain(); wGain.gain.value = 0;
    wNode.connect(wFlt); wFlt.connect(wGain); wGain.connect(audioCtx.destination);
    wNode.start();
  }
  function updateWhoosh(speed) {
    if (!wFlt || !wGain) return;
    const t = audioCtx.currentTime + 0.05, n = Math.min(speed / CFG.IMPULSE, 1);
    wFlt.frequency.linearRampToValueAtTime(200 + n * 2800, t);
    wGain.gain.linearRampToValueAtTime(n * 0.12, t);
  }
  function stopWhoosh() {
    if (!wNode) return;
    wGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    setTimeout(() => { try { wNode.stop(); } catch (e) {} wNode = wGain = wFlt = null; }, 200);
  }
  function playStop() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime, dur = 0.035, sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * dur), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 4000; flt.Q.value = 2;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination); src.start(now); src.stop(now + dur);
  }
  function playReveal() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    [523.25, 659.25].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const g = audioCtx.createGain(); const t = i * 0.12;
      g.gain.setValueAtTime(0, now + t); g.gain.linearRampToValueAtTime(0.15, now + t + 0.01); g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.4);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now + t); osc.stop(now + t + 0.4);
    });
  }
  function playDialog() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 392;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.1, now + 0.02); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.3);
  }

  /* ── RENDERER, SCENE, CAMERA ─────────────────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, CFG.CAM_Z);

  /* ── LIGHTING ────────────────────────────────────────────────────────────── */
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));

  const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
  sunLight.position.set(4, 5, 3);
  scene.add(sunLight);

  const fillLight = new THREE.DirectionalLight(0xaabbff, 0.4);
  fillLight.position.set(-3, -2, 2);
  scene.add(fillLight);

  // Rim light — back-fill creates edge glow (blue halo on dark side of globe)
  const rimLight = new THREE.DirectionalLight(0x2255ff, 1.8);
  rimLight.position.set(-2, 0.5, -6);
  scene.add(rimLight);

  // Atmosphere halo — soft BackSide sphere, not in globeGroup so it never rotates
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(CFG.GLOBE_R * 1.14, 32, 24),
    new THREE.MeshPhongMaterial({
      color: 0x0066cc, transparent: true, opacity: 0.13,
      side: THREE.BackSide, depthWrite: false,
    })
  ));

  // Starfield — 750 points on a large shell
  (function() {
    const N = 750, pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const theta = 2 * Math.PI * Math.random();
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 28 + Math.random() * 14;
      pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i*3+2] = r * Math.cos(phi);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.09, sizeAttenuation: true,
      transparent: true, opacity: 0.82,
    })));
  })();

  // Globe corona — smooth bell-curve halo ring at the globe silhouette
  (function() {
    const SZ  = 512;
    const c   = document.createElement('canvas');
    c.width   = c.height = SZ;
    const ctx = c.getContext('2d');
    const gr  = ctx.createRadialGradient(SZ/2, SZ/2, 0, SZ/2, SZ/2, SZ/2);
    gr.addColorStop(0,    'rgba(0,0,0,0)');
    gr.addColorStop(0.52, 'rgba(0,0,0,0)');
    gr.addColorStop(0.62, 'rgba(20,90,240,0.06)');
    gr.addColorStop(0.68, 'rgba(35,140,255,0.22)');
    gr.addColorStop(0.73, 'rgba(55,170,255,0.42)');
    gr.addColorStop(0.76, 'rgba(65,185,255,0.52)'); // peak
    gr.addColorStop(0.80, 'rgba(45,155,255,0.38)');
    gr.addColorStop(0.86, 'rgba(20,100,230,0.18)');
    gr.addColorStop(0.93, 'rgba(5,50,200,0.05)');
    gr.addColorStop(1.0,  'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, SZ, SZ);
    const mat = new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(c),
      transparent: true, depthWrite: false, depthTest: true,
    });
    const s = new THREE.Sprite(mat);
    s.scale.set(5.8, 5.8, 1);
    scene.add(s);
  })();

  /* ── GLOBE GROUP ─────────────────────────────────────────────────────────── */
  const globeGroup = new THREE.Group();
  globeGroup.rotation.z = -0.25; // natural axial tilt
  scene.add(globeGroup);

  // Sphere — deep navy, PBR material (no specular colour, no orange glow)
  globeGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(CFG.GLOBE_R, 64, 48),
    new THREE.MeshStandardMaterial({
      color:             0x0f2244,
      roughness:         0.68,
      metalness:         0.06,
      emissive:          0x061428,
      emissiveIntensity: 0.28,
    })
  ));

  // Lat/lon grid lines
  (function buildGrid() {
    const GR  = CFG.GLOBE_R + 0.012;
    const mat = new THREE.LineBasicMaterial({ color: 0x6688cc, transparent: true, opacity: 0.20, depthWrite: false });
    const DEG = Math.PI / 180;
    // Latitude rings
    for (let lat = -60; lat <= 60; lat += 30) {
      const pts = [], phi = (90 - lat) * DEG;
      for (let lon = 0; lon <= 360; lon += 3)
        pts.push(new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, phi, lon * DEG)));
      globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
    }
    // Longitude arcs
    for (let lon = 0; lon < 360; lon += 30) {
      const pts = [], theta = lon * DEG;
      for (let lat = -90; lat <= 90; lat += 3)
        pts.push(new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, (90 - lat) * DEG, theta)));
      globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
    }
    // Equator — brighter accent ring
    const eqPts = [];
    for (let lon = 0; lon <= 360; lon += 2)
      eqPts.push(new THREE.Vector3().setFromSpherical(new THREE.Spherical(GR, Math.PI / 2, lon * DEG)));
    globeGroup.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(eqPts),
      new THREE.LineBasicMaterial({ color: 0x55bbff, transparent: true, opacity: 0.40, depthWrite: false })
    ));
  })();

  /* ── WORLD COUNTRY BORDERS ───────────────────────────────────────────────── */
  async function loadWorldBorders() {
    try {
      const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      const topo  = await resp.json();
      const geo   = window.topojson.feature(topo, topo.objects.countries);
      const DEG   = Math.PI / 180;
      const R     = CFG.GLOBE_R + 0.014;
      const mat   = new THREE.LineBasicMaterial({
        color: 0x5599dd, transparent: true, opacity: 0.28, depthWrite: false,
      });

      for (const feature of geo.features) {
        const { type, coordinates } = feature.geometry;
        // Build array of outer rings
        const rings = type === 'Polygon'
          ? [coordinates[0]]
          : coordinates.map(p => p[0]); // MultiPolygon outer rings

        for (const ring of rings) {
          if (!ring || ring.length < 2) continue;
          const pts = ring.map(([lon, lat]) =>
            new THREE.Vector3().setFromSpherical(
              new THREE.Spherical(R, (90 - lat) * DEG, lon * DEG)
            )
          );
          globeGroup.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts), mat
          ));
        }
      }
    } catch (e) {
      console.warn('MakanGlobe: could not load world borders', e);
    }
  }

  /* ── MARKER SPRITES ──────────────────────────────────────────────────────── */
  // logoImg is an HTMLImageElement or null (falls back to initial letter)
  function makeMarkerCanvas(initial, hexColor, logoImg) {
    const SZ  = 112;
    const c   = document.createElement('canvas');
    c.width   = c.height = SZ;
    const ctx = c.getContext('2d');
    const cx  = SZ / 2, cy = SZ / 2, r = SZ / 2 - 4;

    // Drop shadow
    ctx.shadowColor   = 'rgba(0,0,0,0.32)';
    ctx.shadowBlur    = 10;
    ctx.shadowOffsetY = 3;

    // White base disc
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    if (logoImg) {
      // Logo clipped to inner disc
      ctx.save();
      const ir = r - 10;
      ctx.beginPath(); ctx.arc(cx, cy, ir, 0, Math.PI * 2); ctx.clip();
      const pad = cx - ir;
      ctx.drawImage(logoImg, pad, pad, SZ - pad * 2, SZ - pad * 2);
      ctx.restore();
    } else {
      // Coloured fill + initial letter
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = hexColor; ctx.fill();
      // Subtle gloss
      const grad = ctx.createRadialGradient(cx * 0.7, cy * 0.65, 2, cx, cy, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.24)');
      grad.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
      // Letter
      ctx.fillStyle    = '#fff';
      ctx.font         = `900 ${Math.floor(SZ * 0.40)}px Nunito, sans-serif`;
      ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor  = 'rgba(0,0,0,0.28)'; ctx.shadowBlur = 4;
      ctx.fillText(initial, cx, cy + SZ * 0.03);
      ctx.shadowBlur = 0;
    }

    // Coloured ring border
    ctx.strokeStyle = hexColor;
    ctx.lineWidth   = 6;
    ctx.beginPath(); ctx.arc(cx, cy, r - 1, 0, Math.PI * 2);
    ctx.stroke();

    return c;
  }

  function buildMarkers(shops) {
    // Dispose old sprites + remove old HTML logo overlays
    const logoLayer = document.getElementById('logo-layer');
    S.markers.forEach(m => {
      m.sprite.material.map?.dispose();
      m.sprite.material.dispose();
      globeGroup.remove(m.sprite);
      if (m.logoEl) m.logoEl.remove();
    });
    S.markers = [];
    logoLayer.innerHTML = '';

    const N   = Math.min(shops.length, CFG.MARKER_N);
    const PHI = (1 + Math.sqrt(5)) / 2; // golden ratio

    for (let i = 0; i < N; i++) {
      const shop    = shops[i];
      const color   = CFG.PALETTE[i % CFG.PALETTE.length];
      const initial = (shop.title || '?').charAt(0).toUpperCase();

      // Fibonacci sphere — evenly distributes N points on a sphere
      const polarPhi  = Math.acos(1 - 2 * (i + 0.5) / N); // polar from +Y
      const azimTheta = 2 * Math.PI * i / PHI;             // azimuthal from +Z

      const localPos = new THREE.Vector3().setFromSpherical(
        new THREE.Spherical(CFG.MARKER_R, polarPhi, azimTheta)
      );

      // Three.js sprite — colored disc + initial letter (always the fallback)
      const tex    = new THREE.CanvasTexture(makeMarkerCanvas(initial, color, null));
      const mat    = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.28, 0.28, 1);
      sprite.position.copy(localPos);
      globeGroup.add(sprite);

      // HTML <img> overlay for the logo — no CORS needed, positioned each frame via JS
      const markerEntry = { sprite, shop, localPos, logoEl: null, hasLogo: false };
      S.markers.push(markerEntry);

      if (shop.logo) {
        const img = document.createElement('img');
        img.className = 'mlogo';
        img.style.borderColor = color;
        img.onload = () => {
          img.style.display = 'block';
          markerEntry.hasLogo = true; // signal to hide the sprite behind it
        };
        // onerror: img stays display:none, sprite letter shows as fallback
        img.src = shop.logo;
        logoLayer.appendChild(img);
        markerEntry.logoEl = img;
      }
    }
  }

  /* ── VISIBILITY + LOGO OVERLAY POSITIONING ───────────────────────────────── */
  const _tmpV   = new THREE.Vector3();
  const _camPos = new THREE.Vector3(0, 0, CFG.CAM_Z);
  const _halfFovTan = Math.tan(camera.fov * 0.5 * Math.PI / 180); // constant for 42° FOV

  function updateVisibility() {
    const W = window.innerWidth, H = window.innerHeight;
    for (const m of S.markers) {
      m.sprite.getWorldPosition(_tmpV);

      // Opacity: front hemisphere fully visible, fades toward back
      const t = (_tmpV.z / CFG.MARKER_R + 0.18) / 0.34;
      const opacity = Math.max(0, Math.min(1, t));

      // Hide sprite when logo overlay is present (avoid double-rendering)
      m.sprite.material.opacity = m.hasLogo ? 0 : opacity;

      if (m.logoEl) {
        // Compute screen-space size to match the Three.js sprite scale (0.28 world units)
        const dist  = Math.max(0.5, _camPos.distanceTo(_tmpV));
        const pxSz  = Math.round((0.28 * H) / (2 * dist * _halfFovTan));
        const half  = pxSz * 0.5;

        // Project world position → NDC → pixel coordinates
        _tmpV.project(camera);
        const sx = (_tmpV.x + 1) * 0.5 * W - half;
        const sy = (-_tmpV.y + 1) * 0.5 * H - half;

        m.logoEl.style.transform = `translate(${sx}px,${sy}px)`;
        m.logoEl.style.width     = pxSz + 'px';
        m.logoEl.style.height    = pxSz + 'px';
        m.logoEl.style.opacity   = opacity;
      }
    }
  }

  /* ── SNAP ────────────────────────────────────────────────────────────────── */
  const _qSnap = new THREE.Quaternion();
  const _zAxis = new THREE.Vector3(0, 0, 1);

  function findFront() {
    let best = null, bestZ = -Infinity;
    for (const m of S.markers) {
      m.sprite.getWorldPosition(_tmpV);
      if (_tmpV.z > bestZ) { bestZ = _tmpV.z; best = m; }
    }
    return best;
  }

  function beginSnap(targetMarker) {
    const front = targetMarker || findFront();
    if (!front) { onStopped(null); return; }
    S.snapMark = front;
    // Quaternion that brings marker's local position to face +Z (toward camera)
    _qSnap.setFromUnitVectors(front.localPos.clone().normalize(), _zAxis);
    // Ensure shortest-arc slerp
    if (globeGroup.quaternion.dot(_qSnap) < 0) _qSnap.negate();
    S.snapQuat.copy(_qSnap);
    S.phase = 'snapping';
  }

  /* ── WORLD-SPACE ROTATION HELPERS ────────────────────────────────────────── */
  const _qTmp  = new THREE.Quaternion();
  const _xAxis = new THREE.Vector3(1, 0, 0);
  const _yAxis = new THREE.Vector3(0, 1, 0);

  // premultiply applies rotation in world frame (drag feels natural regardless of tilt)
  function rotateWorld(ax, ay) {
    if (ax !== 0) {
      _qTmp.setFromAxisAngle(_xAxis, ax);
      globeGroup.quaternion.premultiply(_qTmp);
    }
    if (ay !== 0) {
      _qTmp.setFromAxisAngle(_yAxis, ay);
      globeGroup.quaternion.premultiply(_qTmp);
    }
  }

  /* ── PHYSICS TICK ────────────────────────────────────────────────────────── */
  function tick() {
    if (S.phase === 'coasting') {
      const speed = Math.hypot(S.velX, S.velY);
      rotateWorld(S.velX, S.velY);
      S.velX *= CFG.FRICTION;
      S.velY *= CFG.FRICTION;
      updateWhoosh(speed);

      // Tick sound
      S.tickAcc += speed;
      if (S.tickAcc >= CFG.TICK_THRESH) {
        playTick(Math.min(0.14, speed / CFG.IMPULSE * 0.14));
        S.tickAcc -= CFG.TICK_THRESH;
      }

      if (speed < 0.0018) { stopWhoosh(); beginSnap(null); }

    } else if (S.phase === 'snapping') {
      globeGroup.quaternion.slerp(S.snapQuat, CFG.SNAP_LERP);
      if (globeGroup.quaternion.angleTo(S.snapQuat) < CFG.SNAP_DONE) {
        globeGroup.quaternion.copy(S.snapQuat);
        onStopped(S.snapMark);
      }

    } else if (S.phase === 'idle') {
      rotateWorld(0, CFG.IDLE_SPEED);
      S.tickAcc += CFG.IDLE_SPEED;
      if (S.tickAcc >= CFG.TICK_THRESH * 4) { playTick(0.012); S.tickAcc -= CFG.TICK_THRESH * 4; }
    }
  }

  /* ── POINTER EVENTS ──────────────────────────────────────────────────────── */
  function getXY(e) {
    if (e.touches?.length)        return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
    if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    if (S.phase === 'stopped') return;
    hideSwipeGuide();
    initAudio();
    const { x, y } = getXY(e);
    S.drag = true;
    S.dragPX = x; S.dragPY = y;
    S.velX = 0; S.velY = 0;
    S.vHistX = []; S.vHistY = [];
    S.totalDist = 0;
    if (S.phase === 'coasting' || S.phase === 'snapping') stopWhoosh();
    S.phase = 'dragging';
  }

  function onMove(e) {
    if (!S.drag) return;
    const { x, y } = getXY(e);
    const dx = x - S.dragPX, dy = y - S.dragPY;
    S.dragPX = x; S.dragPY = y;
    S.totalDist += Math.hypot(dx, dy);

    const vx = dy * CFG.DRAG_SENSE; // up/down drag → pitch
    const vy = dx * CFG.DRAG_SENSE; // left/right drag → yaw
    S.vHistX.push(vx); if (S.vHistX.length > CFG.VEL_AVG) S.vHistX.shift();
    S.vHistY.push(vy); if (S.vHistY.length > CFG.VEL_AVG) S.vHistY.shift();

    rotateWorld(vx, vy);
  }

  function onUp(e) {
    if (!S.drag) return;
    S.drag = false;

    const avg = arr => arr.length ? arr.reduce((a, b) => a + b) / arr.length : 0;
    S.velX = avg(S.vHistX);
    S.velY = avg(S.vHistY);
    S.vHistX = []; S.vHistY = [];

    // Tiny drag — don't count it, return to idle
    if (S.totalDist < CFG.MIN_SPIN_DIST) {
      S.phase = 'idle';
      return;
    }

    const speed = Math.hypot(S.velX, S.velY);
    if (speed > CFG.MIN_COAST_V) {
      S.phase = 'coasting';
      startWhoosh();
    } else {
      beginSnap(null);
    }
  }

  /* ── EVENT WIRING ────────────────────────────────────────────────────────── */
  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart',  e => { e.preventDefault(); onDown(e); }, { passive: false });
  canvas.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e); }, { passive: false });
  window.addEventListener('touchend',    onUp);
  window.addEventListener('touchcancel', onUp);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  /* ── STOPPED / RESULT ────────────────────────────────────────────────────── */
  function onStopped(marker) {
    S.phase = 'stopped';
    playStop();

    const m = marker || findFront();
    if (!m) return;

    setTimeout(() => {
      playReveal();
      setTimeout(() => { playDialog(); showResult(m.shop); }, 300);
    }, 350);
  }

  function showResult(shop) {
    const logo = document.getElementById('result-logo');
    const fb   = document.getElementById('result-logo-fallback');
    document.getElementById('result-name').textContent  = shop.title || 'Unknown';
    document.getElementById('result-venue').textContent = shop.venue
      ? `${shop.venue}${shop.level_label ? ' • ' + shop.level_label : ''}`
      : '';

    if (shop.logo) {
      logo.src = shop.logo; logo.style.display = 'block'; fb.style.display = 'none';
      logo.onerror = () => { logo.style.display = 'none'; fb.style.display = 'flex'; fb.textContent = (shop.title || '?')[0].toUpperCase(); };
    } else {
      logo.style.display = 'none'; fb.style.display = 'flex'; fb.textContent = (shop.title || '?')[0].toUpperCase();
    }

    document.getElementById('result-backdrop').classList.add('visible');
    document.getElementById('result-dialog').classList.add('visible');
  }

  function hideResult() {
    document.getElementById('result-backdrop').classList.remove('visible');
    document.getElementById('result-dialog').classList.remove('visible');
  }

  function doSpinAgain() {
    hideResult();
    buildMarkers(pickRandom(getFilteredShops(), CFG.MARKER_N));
    S.tickAcc = 0;
    S.phase = 'idle';
    showSwipeGuide(1600);
  }

  document.getElementById('spin-again-btn').addEventListener('click', doSpinAgain);
  document.getElementById('result-backdrop').addEventListener('click', doSpinAgain);

  /* ── BROWSE SHEET ────────────────────────────────────────────────────────── */
  const browseBtn      = document.getElementById('browse-btn');
  const browseBackdrop = document.getElementById('browse-backdrop');
  const browseSheet    = document.getElementById('browse-sheet');
  const browseList     = document.getElementById('browse-list');

  function makeBrowseFallback(shop) {
    const fb = document.createElement('div');
    fb.className = 'browse-item-logo-fallback';
    fb.textContent = (shop.title || '?')[0].toUpperCase();
    return fb;
  }

  function openBrowse() {
    const shops = getFilteredShops().slice().sort((a, b) =>
      (a.title || '').localeCompare(b.title || '')
    );
    browseList.innerHTML = '';
    for (const shop of shops) {
      const item = document.createElement('div');
      item.className = 'browse-item';

      if (shop.logo) {
        const img = document.createElement('img');
        img.className = 'browse-item-logo';
        img.src = shop.logo;
        img.onerror = () => img.replaceWith(makeBrowseFallback(shop));
        item.appendChild(img);
      } else {
        item.appendChild(makeBrowseFallback(shop));
      }

      const info = document.createElement('div');
      info.className = 'browse-item-info';
      const name = document.createElement('div');
      name.className = 'browse-item-name';
      name.textContent = shop.title || 'Unknown';
      info.appendChild(name);
      if (shop.venue) {
        const venue = document.createElement('div');
        venue.className = 'browse-item-venue';
        venue.textContent = shop.venue + (shop.level_label ? ' · ' + shop.level_label : '');
        info.appendChild(venue);
      }
      item.appendChild(info);

      item.addEventListener('click', () => {
        closeBrowse();
        initAudio();
        playReveal();
        setTimeout(() => { playDialog(); showResult(shop); }, 300);
      });
      browseList.appendChild(item);
    }
    browseBackdrop.classList.add('visible');
    browseSheet.classList.add('visible');
  }

  function closeBrowse() {
    browseBackdrop.classList.remove('visible');
    browseSheet.classList.remove('visible');
  }

  browseBtn.addEventListener('click', openBrowse);
  browseBackdrop.addEventListener('click', closeBrowse);

  /* ── SWIPE GUIDE ─────────────────────────────────────────────────────────── */
  const swipeGuide = document.getElementById('swipe-guide');
  let _sgTimer = null;
  function showSwipeGuide(delay) {
    clearTimeout(_sgTimer);
    _sgTimer = setTimeout(() => swipeGuide.classList.add('visible'), delay ?? 900);
  }
  function hideSwipeGuide() {
    clearTimeout(_sgTimer);
    swipeGuide.classList.remove('visible');
  }

  /* ── RENDER LOOP ─────────────────────────────────────────────────────────── */
  function animate() {
    requestAnimationFrame(animate);
    if (!S.drag) tick();
    updateVisibility();
    renderer.render(scene, camera);
  }

  /* ── RESIZE ──────────────────────────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── INIT ────────────────────────────────────────────────────────────────── */
  async function init() {
    const overlay   = document.getElementById('loading-overlay');
    const loadState = document.getElementById('loading-state');
    const tapEl     = document.getElementById('tap-prompt');
    const hintEl    = document.getElementById('drag-hint');

    try {
      S.allShops = await loadFBShops();

      loadState.style.display = 'none';
      tapEl.style.display     = 'block';
      initFilters();

      tapEl.addEventListener('click', () => {
        if (tapEl.disabled) return;
        initAudio();
        overlay.style.opacity       = '0';
        overlay.style.pointerEvents = 'none';

        setTimeout(() => {
          overlay.style.display  = 'none';
          buildMarkers(pickRandom(getFilteredShops(), CFG.MARKER_N));
          hintEl.style.display   = 'block';
          browseBtn.style.display = 'block';
          S.phase   = 'idle';
          S.tickAcc = 0;
          showSwipeGuide(1400); // show after globe has had a moment to spin
          // animate() is already running — started before init()
        }, 430);
      }, { once: true });

    } catch (err) {
      console.error('MakanGlobe init error:', err);
      document.getElementById('loading-text').textContent = 'Could not load restaurant data.';
    }
  }

  // Start the render loop immediately so the globe spins behind the start card
  animate();
  // Load country borders in background (adds to scene whenever ready)
  loadWorldBorders();
  // Then load data and set up the start screen UI
  init();
  </script>
</body>
</html>
