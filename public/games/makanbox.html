<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MakanBox</title>
  <link rel="stylesheet" href="../makan-theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); }

    body {
      background: radial-gradient(ellipse at 50% 0%, #FFE8D0 0%, #FFF8F0 62%);
    }

    /* ── Atmospheric background ─────────────────────────────
       Subtle floating food emojis fill the "empty" screen
       with ambient life at near-zero opacity.              */
    #atm {
      position: fixed; inset: 22px; z-index: 0;
      border-radius: 18px;
      pointer-events: none; overflow: hidden;
    }
    #atm span {
      position: absolute;
      left: var(--x); top: var(--y);
      font-size: var(--s, 32px);
      opacity: 0.055;
      animation: atm-drift var(--d, 8s) var(--del, 0s) ease-in-out infinite;
      user-select: none; line-height: 1;
    }
    @keyframes atm-drift {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      50%       { transform: translateY(-16px) rotate(7deg) scale(1.04); }
    }

    /* Dot pattern overlay */
    body::before {
      content: '';
      position: fixed; inset: 22px; z-index: 0;
      border-radius: 18px;
      background-image: radial-gradient(circle, rgba(255,107,53,0.09) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ── Stage ──────────────────────────────────────────────
       clip-path is used in addition to overflow:hidden
       because overflow:hidden alone does not clip children
       that have CSS filter applied (Chrome/WebKit bug).    */
    #stage {
      position: fixed;
      inset: 22px;
      z-index: 1;
      border-radius: 18px;
      overflow: hidden;
      clip-path: inset(0 round 18px);
    }

    /* ── Cartoony frame ─────────────────────────────────────
       Layers (outside → in):
         1. warm cream body background in the 22px gap
         2. outer warm-brown halo  (box-shadow spread)
         3. thick warm-brown stroke  (border: 9px)
         4. white highlight line — "cartoon sticker" look
         5. orange accent fill
         6. thin brown inner hairline
       Low-frequency SVG displacement creates big, round,
       balloon-like wobbles — cartoony, not scratchy.       */
    #frame {
      position: fixed;
      inset: 22px;
      z-index: 50;
      border-radius: 18px;
      border: 9px solid #3d1a06;
      box-shadow:
        /* white highlight just inside the stroke */
        inset 0 0 0 2px rgba(255,255,255,0.82),
        /* orange accent band */
        inset 0 0 0 5px #FF6B35,
        /* thin dark inner hairline */
        inset 0 0 0 7px #3d1a06,
        /* outer warm-brown halo */
        0 0 0 3px #3d1a06,
        /* flood the gap to the window edge */
        0 0 0 22px var(--makan-bg);
      pointer-events: none;
      filter: url(#bl-ink);
    }

    /* ── Box ────────────────────────────────────────────────
       translate(-50%,-50%) centres the box on its absolute
       left/top anchor. perspective(900px) in the transform
       gives each box an independent vanishing point for the
       hover tilt. perspective: 700px property gives the lid
       its own perspective for the flip.                    */
    .box {
      --lift:  0px;
      --scl:   1;
      --tx:    0deg;
      --ty:    0deg;
      --rot:   0deg;
      --depth: 1;        /* 0.62–1.0, set per-box by JS */

      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      perspective: 700px;
      transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                 translateY(var(--lift)) scale(calc(var(--depth) * var(--scl)))
                 rotateX(var(--tx)) rotateY(var(--ty));
      transition:
        transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
        filter    0.28s ease;
      will-change: transform;
      /* Directional drop-shadow — light from top-left */
      filter: drop-shadow(4px 14px 8px rgba(45,21,6,0.22));
    }

    /* Deeper shadow lifts on hover */
    .box.hovered {
      filter: drop-shadow(6px 24px 14px rgba(45,21,6,0.30));
    }

    .box.xs  { --bw: 64px;  --bh: 48px;  --lh: 13px; --qs: 22px; }
    .box.sm  { --bw: 82px;  --bh: 62px;  --lh: 17px; --qs: 30px; }
    .box.md  { --bw: 104px; --bh: 78px;  --lh: 21px; --qs: 36px; }
    .box.lg  { --bw: 128px; --bh: 96px;  --lh: 27px; --qs: 44px; }
    .box.xl  { --bw: 156px; --bh: 116px; --lh: 33px; --qs: 54px; }

    /* ── Lid ────────────────────────────────────────────────
       transform-origin: bottom center so it hinges at the
       seam between lid and body.                           */
    .b-lid {
      width: calc(var(--bw) + 8px);
      height: var(--lh);
      background: var(--cd);
      border-radius: 6px 6px 3px 3px;
      transform-origin: bottom center;
      transition: transform 0.50s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.16);
      position: relative; z-index: 2;
    }

    /* Handle pill */
    .b-hdl {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 32%; height: 40%; min-height: 5px;
      background: rgba(255,255,255,0.65);
      border-radius: 99px;
    }

    /* ── Body ───────────────────────────────────────────── */
    .b-body {
      width: var(--bw);
      height: var(--bh);
      background: var(--c);
      border-radius: 0 0 6px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 8px 28px rgba(0,0,0,0.20),
        0 2px 6px  rgba(0,0,0,0.10),
        0 -2px 0   var(--cd) inset;
    }

    /* Glass panel — mirrors the start-card aesthetic */
    .b-body::before {
      content: '';
      position: absolute; inset: 8px;
      background: rgba(255,255,255,0.13);
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.30);
    }
    /* Inner dot texture */
    .b-body::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1px, transparent 1px);
      background-size: 13px 13px;
      border-radius: 6px;
    }

    /* Label: "?" or category emoji when filtered */
    .b-q {
      position: relative; z-index: 1;
      font-size: var(--qs);
      font-weight: 900;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
      user-select: none;
    }

    /* ── Hovered shadow ─────────────────────────────────── */
    .box.hovered .b-body {
      box-shadow:
        0 28px 60px rgba(0,0,0,0.22),
        0 8px  20px rgba(0,0,0,0.14),
        0 -2px 0   var(--cd) inset;
    }

    /* ── Dimmed ─────────────────────────────────────────── */
    .box.dimmed {
      filter: brightness(0.40) saturate(0.25);
      pointer-events: none;
      cursor: default;
    }

    /* ── Open ────────────────────────────────────────────── */
    .box.open .b-lid { transform: rotateX(-138deg); }

    /* ── Lid rattle on hover ────────────────────────────── */
    @keyframes lid-rattle {
      0%,100% { transform: rotateX(0deg) translateX(0px); }
      20%      { transform: rotateX(-5deg) translateX(-1px); }
      40%      { transform: rotateX(1deg)  translateX(1.5px); }
      60%      { transform: rotateX(-4deg) translateX(0px); }
      80%      { transform: rotateX(0.5deg) translateX(-0.5px); }
    }
    /* Rattle only when hovered and not open */
    .box.hovered:not(.open) .b-lid {
      animation: lid-rattle 0.65s ease-in-out infinite;
    }

    /* ── Dust ring ───────────────────────────────────────── */
    @keyframes dust-ring {
      0%   { width: 12px; height: 6px; opacity: 0.55; }
      100% { width: 120px; height: 28px; opacity: 0; }
    }
    .dust {
      position: fixed;
      transform: translate(-50%, -50%);
      border: 1.5px solid rgba(255,107,53,0.45);
      border-radius: 50%;
      pointer-events: none;
      animation: dust-ring 0.5s ease-out forwards;
      z-index: 4;
    }

    /* ── Fall animation ──────────────────────────────────
       Include translate(-50%,-50%) and scale(var(--depth))
       in EVERY keyframe to avoid a jump when the animation
       ends and the CSS base transform takes over.

       Per-keyframe animation-timing-function:
        0→66%  ease-in   (gravity)
       66→77%  spring    (squash → bounce)
       77→85%  ease-in   (back down)
       85→92%  spring    (mini bounce)
       92→100% ease-out  (settle)                         */
    @keyframes fall-in {
      0% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(-130vh) scale(var(--depth));
        opacity: 0;
        animation-timing-function: cubic-bezier(0.55, 0, 0.85, 0.5);
      }
      5%  { opacity: 1; }
      66% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(0) scale(var(--depth)) scaleY(0.76) scaleX(1.18);
        animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      77% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(-16px) scale(var(--depth)) scaleY(1.08) scaleX(0.95);
        animation-timing-function: cubic-bezier(0.55, 0, 0.85, 0.5);
      }
      85% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(0) scale(var(--depth)) scaleY(0.95) scaleX(1.03);
        animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      92% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(-5px) scale(var(--depth)) scaleY(1.01);
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }
      100% {
        transform: translate(-50%,-50%) perspective(900px) rotate(var(--rot))
                   translateY(0) scale(var(--depth));
        opacity: 1;
      }
    }
    .box.falling {
      animation: fall-in 0.62s both;
      pointer-events: none !important;
      z-index: 30 !important;
    }

    /* ── Filters ─────────────────────────────────────────── */
    #filter-wrap {
      display: none;
      flex-direction: column;
      gap: 9px;
      width: 100%;
      margin-top: 4px;
    }
    .filter-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .flabel {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--makan-text-muted);
      min-width: 46px;
      padding-top: 5px;
      flex-shrink: 0;
      text-align: right;
    }
    .fpills { display: flex; flex-wrap: wrap; gap: 5px; }
    .fpill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px 10px;
      border: none;
      border-radius: 99px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(45, 21, 6, 0.07);
      color: var(--makan-text-2);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.15s ease, box-shadow 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }
    .fpill:hover  { background: rgba(255,107,53,0.14); transform: scale(1.07); }
    .fpill.active { background: var(--makan-orange); color: #fff;
                    box-shadow: 0 2px 10px rgba(255,107,53,0.38); transform: scale(1.05); }
    .filter-divider {
      width: 100%; height: 1px;
      background: rgba(255,107,53,0.12);
      margin: 2px 0;
    }
    #filter-count {
      font-size: 12px; font-weight: 700;
      color: var(--makan-text-muted);
      text-align: center;
      transition: color 0.2s ease;
    }
    #filter-count.empty { color: var(--makan-coral); }

    /* ── Start / Loading screen ─────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #fff4e8 0%, #ffe0c4 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    .fe {
      position: absolute; opacity: 0.22;
      animation: fe-float var(--d, 6s) var(--del, 0s) ease-in-out infinite;
      user-select: none; pointer-events: none; line-height: 1;
    }
    @keyframes fe-float {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      30%       { transform: translateY(-22px) rotate(9deg) scale(1.07); }
      65%       { transform: translateY(13px) rotate(-4deg) scale(0.95); }
    }
    .start-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 28px; padding: 44px 54px 40px;
      box-shadow: 0 8px 48px rgba(255,107,53,0.16), 0 2px 8px rgba(0,0,0,0.06);
      border: 2px solid rgba(255,107,53,0.14); text-align: center;
    }
    .start-icon {
      font-size: 68px; line-height: 1;
      animation: makan-bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .start-title {
      font-size: 46px; font-weight: 900; color: var(--makan-orange);
      letter-spacing: -2px; line-height: 1; margin-top: 2px;
    }
    .start-rule {
      width: 44px; height: 4px;
      background: linear-gradient(90deg, var(--makan-orange), var(--makan-yellow));
      border-radius: 2px; margin: 2px 0 4px;
    }
    .start-sub {
      font-size: 15px; font-weight: 700; color: var(--makan-text-2);
      max-width: 230px; line-height: 1.45;
    }
    #loading-state {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-top: 4px;
    }
    #loading-text { font-size: 15px; font-weight: 700; color: var(--makan-text-2); }
    #tap-prompt {
      display: none; margin-top: 4px;
      font-size: 18px; font-weight: 900; cursor: pointer;
      padding: 15px 46px;
      background: var(--makan-orange); color: #fff;
      border: none; border-radius: var(--r-full);
      box-shadow: 0 4px 22px rgba(255,107,53,0.42);
      font-family: var(--font);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease,
                  opacity 0.2s ease;
      user-select: none; -webkit-user-select: none;
    }
    #tap-prompt:not(:disabled):hover {
      transform: scale(1.07); box-shadow: 0 6px 32px rgba(255,107,53,0.52);
    }
    #tap-prompt:disabled { cursor: not-allowed; }

    /* ── Backdrop ───────────────────────────────────────── */
    #backdrop {
      position: fixed; inset: 0;
      background: rgba(45,21,6,0.58);
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #backdrop.visible { opacity: 1; pointer-events: auto; cursor: pointer; }

    /* ── Reveal overlay ─────────────────────────────────── */
    #reveal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s ease;
    }
    #reveal-overlay.visible { opacity: 1; }
    .reveal-card {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 44px 56px 38px; border-radius: 32px;
      background: var(--rev-bg, #FF6B35);
      box-shadow: 0 10px 52px rgba(0,0,0,0.30), 0 3px 14px rgba(0,0,0,0.16);
      text-align: center; min-width: 280px; max-width: 400px;
      animation: rev-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes rev-pop {
      from { transform: scale(0.55) translateY(16px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    .reveal-logo {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      object-fit: contain; flex-shrink: 0;
    }
    .reveal-logo-fb {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: none; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 900;
      color: var(--rev-bg, #FF6B35); flex-shrink: 0;
    }
    .reveal-name {
      font-size: 24px; font-weight: 900; color: #fff; line-height: 1.28;
      text-shadow: 0 1px 4px rgba(0,0,0,0.22); max-width: 320px;
    }
    .reveal-venue {
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,0.78); margin-top: -4px;
    }
    .reveal-hint {
      font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.52); margin-top: 2px;
    }

    /* ── Try Again ──────────────────────────────────────── */
    #repick-btn {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 1001; display: none;
      padding: 13px 34px; border: none; border-radius: var(--r-full);
      background: var(--makan-orange); color: #fff;
      font-size: 16px; font-weight: 900; cursor: pointer;
      box-shadow: 0 4px 22px rgba(255,107,53,0.44);
      font-family: var(--font);
      transition: background 0.15s ease, box-shadow 0.15s ease,
        transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    #repick-btn:hover {
      background: var(--makan-orange-dk);
      box-shadow: 0 6px 30px rgba(255,107,53,0.54);
      transform: translateX(-50%) scale(1.07);
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .start-card  { padding: 28px 20px 24px; }
      .start-title { font-size: 38px; }
      .start-icon  { font-size: 56px; }
      .start-sub   { font-size: 14px; max-width: 200px; }
      .reveal-card { padding: 32px 28px 28px; min-width: 0; max-width: 88vw; }
      .reveal-logo, .reveal-logo-fb { width: 88px; height: 88px; }
      .reveal-logo-fb { font-size: 36px; }
      .reveal-name { font-size: 20px; }
      .reveal-venue { font-size: 13px; }
      .flabel      { min-width: 38px; font-size: 9px; }
      .fpill       { font-size: 11px; padding: 3px 8px; }
    }
  </style>
</head>
<body>

  <!-- ── SVG filter: rough ink texture for frame ────────────── -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
    <defs>
      <!-- Low-frequency turbulence + high scale = big, round,
           balloon-like wobbles instead of scratchy texture.
           This gives the cartoon bubble-outline feel.       -->
      <filter id="bl-ink" x="-5%" y="-5%" width="110%" height="110%"
              color-interpolation-filters="linearRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.014"
                      numOctaves="2" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise"
                           scale="5"
                           xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- ── Frame border (above stage, below overlays) ────────── -->
  <div id="frame" aria-hidden="true"></div>

  <!-- ── Atmospheric background ─────────────────────────── -->
  <div id="atm" aria-hidden="true">
    <span style="--x:5%;  --y:8%;  --s:48px; --d:7.2s; --del:0s  ">🍜</span>
    <span style="--x:82%; --y:6%;  --s:34px; --d:9.1s; --del:1.4s">🍔</span>
    <span style="--x:46%; --y:4%;  --s:52px; --d:6.8s; --del:0.7s">🍱</span>
    <span style="--x:91%; --y:38%; --s:28px; --d:8.4s; --del:2.1s">🍣</span>
    <span style="--x:2%;  --y:52%; --s:36px; --d:7.6s; --del:1.8s">🌮</span>
    <span style="--x:72%; --y:78%; --s:30px; --d:9.8s; --del:0.4s">🥢</span>
    <span style="--x:18%; --y:82%; --s:44px; --d:6.4s; --del:3.0s">🍕</span>
    <span style="--x:55%; --y:88%; --s:26px; --d:8.9s; --del:1.1s">🧆</span>
    <span style="--x:33%; --y:20%; --s:38px; --d:7.0s; --del:2.5s">🥐</span>
    <span style="--x:88%; --y:62%; --s:32px; --d:10s;  --del:0.9s">🍛</span>
    <span style="--x:24%; --y:45%; --s:22px; --d:8.2s; --del:1.6s">🥤</span>
    <span style="--x:64%; --y:30%; --s:40px; --d:7.5s; --del:3.4s">☕</span>
  </div>

  <!-- ── Start / loading screen ──────────────────────────── -->
  <div id="loading-overlay">
    <span class="fe" style="top:7%;left:5%;font-size:34px;--d:5.4s;--del:0s">🍜</span>
    <span class="fe" style="top:68%;left:3%;font-size:22px;--d:6.9s;--del:1.1s">🥢</span>
    <span class="fe" style="top:14%;right:7%;font-size:40px;--d:4.8s;--del:0.6s">🍔</span>
    <span class="fe" style="top:76%;right:5%;font-size:27px;--d:7.3s;--del:2.0s">🍣</span>
    <span class="fe" style="top:44%;left:2%;font-size:20px;--d:5.8s;--del:1.5s">🧆</span>
    <span class="fe" style="top:36%;right:3%;font-size:32px;--d:6.2s;--del:0.3s">🌮</span>
    <span class="fe" style="bottom:16%;left:11%;font-size:26px;--d:5.1s;--del:2.5s">🍕</span>
    <span class="fe" style="bottom:10%;right:11%;font-size:36px;--d:7.7s;--del:1.8s">🍱</span>

    <div class="start-card">
      <div class="start-icon">🍱</div>
      <h1 class="start-title">MakanBox</h1>
      <div class="start-rule"></div>
      <p class="start-sub">Pick a mystery box to discover your next restaurant!</p>

      <!-- ── Filters (shown after data loads) ────────────── -->
      <div id="filter-wrap">
        <div class="filter-divider"></div>
        <div class="filter-row">
          <span class="flabel">Dietary</span>
          <div class="fpills">
            <button class="fpill" data-catid="724">🌙 Halal</button>
            <button class="fpill" data-catid="732">🐷 Pork Free</button>
            <button class="fpill" data-catid="735">🥗 Veg</button>
            <button class="fpill" data-catid="728">👦 Kids</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Cuisine</span>
          <div class="fpills">
            <button class="fpill" data-catid="730">🍜 Local</button>
            <button class="fpill" data-catid="720">🥢 Chinese</button>
            <button class="fpill" data-catid="727">🍱 Japanese</button>
            <button class="fpill" data-catid="729">🌶️ Korean</button>
            <button class="fpill" data-catid="737">🍔 Western</button>
            <button class="fpill" data-catid="725">🍛 Indian</button>
            <button class="fpill" data-catid="734">🌿 Thai</button>
          </div>
        </div>
        <div class="filter-row">
          <span class="flabel">Type</span>
          <div class="fpills">
            <button class="fpill" data-catid="721">🍰 Desserts</button>
            <button class="fpill" data-catid="722">🥤 Drinks</button>
            <button class="fpill" data-catid="719">☕ Café</button>
            <button class="fpill" data-catid="718">🥐 Bakery</button>
            <button class="fpill" data-catid="723">⚡ Fast Food</button>
            <button class="fpill" data-catid="733">🍿 Snack</button>
          </div>
        </div>
        <p id="filter-count"></p>
        <div class="filter-divider"></div>
      </div>

      <div id="loading-state">
        <div class="makan-spinner"></div>
        <p id="loading-text">Filling the boxes…</p>
      </div>
      <button id="tap-prompt">Pick a Box! 🎉</button>
    </div>
  </div>

  <!-- ── Stage (boxes injected by JS) ────────────────────── -->
  <div id="stage"></div>

  <!-- ── Backdrop ─────────────────────────────────────────── -->
  <div id="backdrop"></div>

  <!-- ── Reveal card ──────────────────────────────────────── -->
  <div id="reveal-overlay">
    <div class="reveal-card" id="reveal-card">
      <img  class="reveal-logo"    id="rev-logo" src="" alt="" style="display:none">
      <div  class="reveal-logo-fb" id="rev-fb"></div>
      <h2   class="reveal-name"    id="rev-name"></h2>
      <p    class="reveal-venue"   id="rev-venue"></p>
      <span class="reveal-hint">Tap anywhere to close</span>
    </div>
  </div>

  <button id="repick-btn">Try Again! 🎁</button>

  <script src="data.js"></script>
  <script>
  'use strict';

  // ── Filter groups ─────────────────────────────────────────
  // Used by getFilteredShops() for AND-between-groups logic.
  // Within a group the union (OR) is taken; across groups the
  // intersection (AND) is taken so "Halal + Japanese" means
  // halal restaurants that are also Japanese, not all halal
  // restaurants plus all Japanese restaurants.
  const FILTER_GROUPS = {
    dietary: [724, 732, 735, 728],           // Halal, Pork Free, Veg, Kids
    cuisine: [730, 720, 727, 729, 737, 725, 734], // Local, Chinese, JP, KR, Western, Indian, Thai
    type:    [721, 722, 719, 718, 723, 733],  // Desserts, Drinks, Café, Bakery, Fast Food, Snack
  };

  // ── Palette ──────────────────────────────────────────────
  // All boxes use the brand orange — the mystery is which
  // restaurant is inside, not a colour signal.
  const PALETTE = [
    { c: '#FF6B35', cd: '#e55a26' },  // brand orange
  ];

  function colorForShop() { return 0; }

  // ── Category → display label ─────────────────────────────
  // When filters are active: shows the type emoji so users
  // know what category they'll get — mystery is WHICH place,
  // not WHAT type (which they already chose via filters).
  const CAT_LABEL_PRIORITY = [
    [721,'🍰'],[722,'🥤'],[718,'🥐'],[719,'☕'],
    [727,'🍱'],[729,'🌶️'],[725,'🍛'],[720,'🥢'],
    [730,'🍜'],[734,'🌿'],[737,'🍔'],[723,'⚡'],
    [733,'🍿'],[724,'🌙'],[732,'✅'],[728,'👦'],[735,'🥗'],
  ];
  function labelForShop(shop) {
    if (activeFilters.size === 0) return '?';
    for (const [id, emoji] of CAT_LABEL_PRIORITY) {
      if (shop.categories.includes(id)) return emoji;
    }
    return '?';
  }

  // Varied size distribution across 5 sizes — xl/lg anchor visually,
  // xs/sm provide contrast and fill gaps between larger boxes.
  const SIZE_PAT = ['md','lg','sm','xl','md','xs','lg','md','sm','xl','xs','md','lg','sm','md','xl','sm','lg','xs','md','sm','md'];

  // ── State ────────────────────────────────────────────────
  let allShops     = [];
  let openedBox    = null;
  let activeFilters = new Set();

  function getFilteredShops() {
    if (activeFilters.size === 0) return allShops;

    // Bucket each active filter ID into its group
    const activeByGroup = {};
    for (const id of activeFilters) {
      for (const [group, ids] of Object.entries(FILTER_GROUPS)) {
        if (ids.includes(id)) {
          if (!activeByGroup[group]) activeByGroup[group] = [];
          activeByGroup[group].push(id);
          break;
        }
      }
    }

    // AND between groups, OR within each group:
    //   e.g. "Halal + Pork Free + Japanese" →
    //   shop must match (Halal OR Pork Free) AND (Japanese)
    return allShops.filter(shop =>
      Object.values(activeByGroup).every(groupIds =>
        groupIds.some(id => shop.categories.includes(id))
      )
    );
  }

  function updateFilterCount() {
    const n   = getFilteredShops().length;
    const el  = document.getElementById('filter-count');
    const btn = document.getElementById('tap-prompt');
    el.textContent = n === 0
      ? 'No restaurants match — try fewer filters'
      : `${n} restaurant${n !== 1 ? 's' : ''} available`;
    el.classList.toggle('empty', n === 0);
    btn.disabled     = n === 0;
    btn.style.opacity = n === 0 ? '0.45' : '';
  }

  function initFilters() {
    const wrap = document.getElementById('filter-wrap');
    wrap.style.display = 'flex';
    updateFilterCount();
    wrap.querySelectorAll('.fpill').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.catid);
        if (activeFilters.has(id)) {
          activeFilters.delete(id); btn.classList.remove('active');
        } else {
          activeFilters.add(id);   btn.classList.add('active');
        }
        updateFilterCount();
      });
    });
  }

  // ── Audio ────────────────────────────────────────────────
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playThud(intensity) {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime;
    const dur = 0.04 + intensity * 0.07;
    const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const flt = audioCtx.createBiquadFilter();
    flt.type  = 'bandpass'; flt.frequency.value = 900 - intensity * 600; flt.Q.value = 0.9;
    const g   = audioCtx.createGain();
    g.gain.setValueAtTime(0.06 + intensity * 0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.02);
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur + 0.03);
  }
  function playChime() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [523.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
      const g   = audioCtx.createGain(); const s = i * 0.09;
      g.gain.setValueAtTime(0, t + s);
      g.gain.linearRampToValueAtTime(0.12, t + s + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + s + 0.36);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + s); osc.stop(t + s + 0.40);
    });
  }

  // ── Scatter layout ───────────────────────────────────────
  // Positions are stored as 0–1 fractions and applied as CSS
  // percentages (left/top). This means boxes always fill the
  // viewport regardless of when or how the window is resized —
  // no rebuild needed on viewport changes.
  function computeScatter(count) {
    const W = innerWidth, H = innerHeight;
    const mobile = W <= 600;
    const cols   = mobile ? 4 : Math.max(5, Math.round(Math.sqrt(count * W / H * 1.4)));
    const rows   = Math.ceil(count / cols);

    // Stage dimensions (inset: 22px each side)
    const sW = W - 44, sH = H - 44;

    // Safe margin in pixels: half the largest box (xl: 156×116 px) + 16px gap
    // so no box centre can be within this distance of the stage edge.
    const safeX = mobile ? 52 : 94;   // px from stage left/right
    const safeY = mobile ? 42 : 74;   // px from stage top/bottom

    const usableW = sW - safeX * 2;
    const usableH = sH - safeY * 2;

    const cells = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        cells.push({ c, r });
    for (let i = cells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cells[i], cells[j]] = [cells[j], cells[i]];
    }

    return cells.slice(0, count).map(({ c, r }) => {
      // Position within usable area, then offset by safe margin
      const xPx = safeX + (c + Math.random()) / cols * usableW;
      const yPx = safeY + (r + Math.random()) / rows * usableH;
      // Convert to stage fractions (0–1) for CSS %
      const xPct  = xPx / sW;
      const yPct  = yPx / sH;
      // depth derived from yPct — bottom boxes appear closer/larger
      const depth = 0.58 + yPct * 0.42;         // 0.58 (far) → 1.0 (near)
      return {
        xPct, yPct, depth,
        rot: (Math.random() - 0.5) * 14,        // ±7° scatter rotation
      };
    });
  }

  // ── Dust puff ─────────────────────────────────────────────
  // A brief expanding elliptical ring at the box landing point.
  function spawnDust(el) {
    const r    = el.getBoundingClientRect();
    const dust = document.createElement('div');
    dust.className = 'dust';
    dust.style.left = `${r.left + r.width  * 0.5}px`;
    dust.style.top  = `${r.top  + r.height * 0.88}px`;
    document.body.appendChild(dust);
    setTimeout(() => dust.remove(), 600);
  }

  // ── Box factory ───────────────────────────────────────────
  function makeBox(shop, pos, szKey) {
    const ci      = colorForShop();
    const { c, cd } = PALETTE[ci];
    const label   = labelForShop(shop);

    const el = document.createElement('div');
    el.className = `box ${szKey}`;
    el.style.left   = `${(pos.xPct * 100).toFixed(2)}%`;
    el.style.top    = `${(pos.yPct * 100).toFixed(2)}%`;
    el.style.zIndex = Math.round(pos.depth * 10);
    el.style.setProperty('--c',     c);
    el.style.setProperty('--cd',    cd);
    el.style.setProperty('--rot',   `${pos.rot}deg`);
    el.style.setProperty('--depth', pos.depth.toFixed(3));
    el.innerHTML = `<div class="b-lid"><div class="b-hdl"></div></div>
                    <div class="b-body"><span class="b-q">${label}</span></div>`;
    el._shop = shop;
    el._ci   = ci;

    // Cursor-tracking 3D tilt — the core Awwwards micro-interaction
    el.addEventListener('mousemove', e => {
      if (openedBox || el.classList.contains('dimmed')) return;
      const r  = el.getBoundingClientRect();
      const nx = (e.clientX - r.left) / r.width  - 0.5;
      const ny = (e.clientY - r.top)  / r.height - 0.5;
      el.style.setProperty('--tx',   `${-ny * 14}deg`);
      el.style.setProperty('--ty',   `${nx  * 14}deg`);
      el.style.setProperty('--lift', '-11px');
      el.style.setProperty('--scl',  '1.06');
      el.classList.add('hovered');
    });
    el.addEventListener('mouseleave', () => resetHover(el));

    el.addEventListener('click', () => {
      if (openedBox || el.classList.contains('dimmed')) return;
      openBox(el);
    });
    el.addEventListener('touchend', e => {
      e.preventDefault();
      if (openedBox || el.classList.contains('dimmed')) return;
      openBox(el);
    }, { passive: false });

    return el;
  }

  function resetHover(el) {
    el.style.setProperty('--tx',   '0deg');
    el.style.setProperty('--ty',   '0deg');
    el.style.setProperty('--lift', '0px');
    el.style.setProperty('--scl',  '1');
    el.classList.remove('hovered');
  }

  // ── Open / dismiss ────────────────────────────────────────
  function openBox(el) {
    openedBox = el;
    el.classList.add('open');
    resetHover(el);
    document.querySelectorAll('.box').forEach(b => { if (b !== el) b.classList.add('dimmed'); });
    document.getElementById('backdrop').classList.add('visible');
    document.getElementById('repick-btn').style.display = 'block';
    playThud(0.55);
    setTimeout(() => { showReveal(el._shop, el._ci); playChime(); }, 420);
  }

  function dismiss() {
    if (!openedBox) return;
    openedBox.classList.remove('open');
    openedBox = null;
    hideReveal();
    document.querySelectorAll('.box').forEach(b => b.classList.remove('dimmed'));
    document.getElementById('backdrop').classList.remove('visible');
    document.getElementById('repick-btn').style.display = 'none';
  }

  // ── Reveal ────────────────────────────────────────────────
  function showReveal(shop, ci) {
    const card = document.getElementById('reveal-card');
    const logo = document.getElementById('rev-logo');
    const fb   = document.getElementById('rev-fb');
    card.style.setProperty('--rev-bg', PALETTE[ci].c);
    const src = shop.logo || '';
    if (src) {
      logo.src = src; logo.style.display = 'block'; fb.style.display = 'none';
      logo.onerror = () => { logo.style.display = 'none'; fb.style.display = 'flex'; };
    } else {
      logo.style.display = 'none';
      fb.style.display   = 'flex';
      fb.textContent     = (shop.title || '?')[0].toUpperCase();
    }
    document.getElementById('rev-name').textContent  = shop.title || 'Unknown';
    document.getElementById('rev-venue').textContent = shop.venue  || '';
    document.getElementById('reveal-overlay').classList.add('visible');
  }
  function hideReveal() {
    document.getElementById('reveal-overlay').classList.remove('visible');
  }

  // ── Start round ───────────────────────────────────────────
  function startRound() {
    const stage   = document.getElementById('stage');
    const mobile  = innerWidth <= 600;
    const pool    = getFilteredShops();
    const count   = Math.min(pool.length, mobile ? 24 : 44);
    const chosen  = pickRandom(pool, count);
    const scatter = computeScatter(count);
    const stagger = Math.min(75, Math.max(28, 900 / count));

    stage.innerHTML = '';
    openedBox = null;
    hideReveal();
    document.getElementById('backdrop').classList.remove('visible');
    document.getElementById('repick-btn').style.display = 'none';

    chosen.forEach((shop, i) => {
      const pos  = scatter[i];
      const sz   = SIZE_PAT[i % SIZE_PAT.length];
      const dur  = 580 + Math.random() * 80;
      const el   = makeBox(shop, pos, sz);

      el.classList.add('falling');
      el.style.animationDelay    = `${i * stagger}ms`;
      el.style.animationDuration = `${dur}ms`;

      // Thuds timed to squash (66%) and bounce (85%) moments
      const t0 = i * stagger;
      setTimeout(() => playThud(0.35 + Math.random() * 0.50), t0 + dur * 0.66);
      setTimeout(() => playThud(0.07 + Math.random() * 0.11), t0 + dur * 0.85);

      el.addEventListener('animationend', () => {
        el.classList.remove('falling');
        el.style.zIndex = Math.round(pos.depth * 10); // restore depth z-index
        spawnDust(el);
      }, { once: true });

      stage.appendChild(el);
    });
  }

  // ── Listeners ─────────────────────────────────────────────
  document.getElementById('backdrop').addEventListener('click', dismiss);

  document.getElementById('repick-btn').addEventListener('click', () => {
    dismiss();
    [...document.querySelectorAll('.box')].forEach((b, i) => {
      b.style.transition = `opacity 0.18s ease ${i * 22}ms, transform 0.22s ease ${i * 22}ms`;
      b.style.opacity    = '0';
      b.style.transform  = `translate(-50%,-50%) perspective(900px) rotate(var(--rot)) translateY(22px) scale(0.86)`;
    });
    setTimeout(startRound, 280);
  });

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    const overlay   = document.getElementById('loading-overlay');
    const loadState = document.getElementById('loading-state');
    const tapBtn    = document.getElementById('tap-prompt');

    try {
      allShops = await loadFBShops();
      loadState.style.display = 'none';
      tapBtn.style.display    = 'block';
      initFilters();

      tapBtn.addEventListener('click', () => {
        if (tapBtn.disabled) return;
        initAudio();
        overlay.style.opacity      = '0';
        overlay.style.pointerEvents = 'none';
        setTimeout(() => { overlay.style.display = 'none'; startRound(); }, 400);
      }, { once: true });

    } catch (e) {
      console.error('MakanBox:', e);
      loadState.innerHTML = `<p style="color:var(--makan-coral);font-weight:700;font-size:14px">
        Could not load restaurant data.<br>Please check data.js is available.</p>`;
    }
  }

  init();

  </script>
</body>
